<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的知识库</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/themes/vue.css">
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: '我的知识库',
      repo: 'https://github.com/tiam-bloom/private-notes',
	  basePath: '/public-notes/', // 👈 关键修复
	  loadSidebar: true,  // 👈 必须开启
      subMaxLevel: 2,     // 👈 显示二级目录
      search: 'auto'      // 👈 搜索
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
</body>
</html>
